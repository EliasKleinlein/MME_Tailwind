<!doctype html>

<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Galerie | MEM Hypercars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Poppins:wght@300;400;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style/syle_galery.css" />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      .title {
        font-family: "Bebas Neue", sans-serif;
      }

      /* ========================================
         GALERIE: BILDER, WECHSEL UND ZOOM
      ======================================== */

      .vehicle {
        --accent: 234 179 8;
        position: relative;
      }

      .vehicle-media {
        position: relative;
        display: block;
        width: 100%;
        height: 430px;
        overflow: hidden;
        cursor: zoom-in;
        border: 1px solid rgba(var(--accent), 0.28);
        background: rgba(9, 9, 11, 0.96);
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.38);
        transition:
          transform 0.55s ease,
          border-color 0.55s ease,
          box-shadow 0.55s ease;
      }

      .vehicle-media:hover {
        z-index: 20;
        transform: scale(1.045);
        border-color: rgba(var(--accent), 0.75);
        box-shadow:
          0 0 45px rgba(var(--accent), 0.2),
          0 35px 90px rgba(0, 0, 0, 0.65);
      }

      .vehicle-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transition: transform 0.8s ease;
      }

      .vehicle-media:hover .vehicle-image {
        transform: scale(1.06);
      }

      .vehicle-image-primary {
        z-index: 1;
        opacity: 1;
      }

      .vehicle-image-secondary {
        z-index: 2;
        opacity: 0;
        animation: vehicle-image-secondary 12s ease-in-out infinite;
      }

      .vehicle-media::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.72),
          transparent 55%
        );
      }

      .vehicle-number {
        color: transparent;
        -webkit-text-stroke: 1px rgba(var(--accent), 0.72);
      }

      .vehicle-info {
        position: relative;
        z-index: 10;
        max-height: 260px;
        overflow: hidden;
        border: 1px solid rgba(var(--accent), 0.3);
        background: rgba(9, 9, 11, 0.78);
        backdrop-filter: blur(18px);
        transition:
          max-height 0.7s ease,
          transform 0.55s ease,
          border-color 0.55s ease,
          background 0.55s ease,
          box-shadow 0.55s ease;
      }

      .vehicle:hover .vehicle-info {
        max-height: 680px;
        transform: scale(1.02);
        border-color: rgba(var(--accent), 0.75);
        background: rgba(9, 9, 11, 0.95);
        box-shadow:
          0 0 45px rgba(var(--accent), 0.15),
          0 30px 70px rgba(0, 0, 0, 0.5);
      }

      .vehicle-details {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.45s ease 0.08s,
          transform 0.45s ease 0.08s;
      }

      .vehicle:hover .vehicle-details {
        opacity: 1;
        transform: translateY(0);
      }

      .vehicle-calendar {
        border-color: rgba(var(--accent), 0.4);
        color: rgb(var(--accent));
      }

      .vehicle-calendar:hover {
        border-color: rgba(var(--accent), 0.9);
        background: rgba(var(--accent), 0.14);
        box-shadow: 0 0 28px rgba(var(--accent), 0.25);
      }

      .zoom-toggle {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .zoom-toggle:checked ~ .vehicle-media {
        position: fixed;
        inset: 0;
        z-index: 100;
        width: 100vw;
        height: 100vh;
        border: 0;
        border-radius: 0;
        cursor: zoom-out;
        transform: none;
        background: rgba(0, 0, 0, 0.97);
        box-shadow: none;
      }

      .zoom-toggle:checked ~ .vehicle-media .vehicle-image {
        object-fit: contain;
        transform: none;
      }

      .zoom-toggle:checked ~ .vehicle-media::after {
        background: transparent;
      }

      .zoom-toggle:checked ~ .vehicle-media .vehicle-number {
        display: none;
      }

      .vehicle:has(.zoom-toggle:checked) {
        z-index: 9999;
      }

      body:has(.zoom-toggle:checked) main {
        z-index: 9999;
      }

      body:has(.zoom-toggle:checked) {
        overflow: hidden;
      }

      @keyframes vehicle-image-primary {
        0%,
        42% {
          opacity: 1;
        }
        50%,
        92% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      @keyframes vehicle-image-secondary {
        0%,
        40% {
          opacity: 0;
        }

        50%,
        90% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }

      @media (max-width: 1023px) {
        .vehicle-media {
          height: 360px;
        }

        .vehicle-info {
          max-height: none;
        }

        .vehicle-details {
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 640px) {
        .vehicle-media {
          height: 280px;
        }
      }
    </style>

    <script
      src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
      defer
    ></script>
    <script src="JavaScript/galery.js" defer></script>
  </head>
