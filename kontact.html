<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEM Hypercars</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      .title {
        font-family: "Bebas Neue", sans-serif;
      }
    </style>
  </head>

  <body class="bg-black text-white">
    <!-- NAVBAR -->
    <header class="bg-zinc-900">
      <nav class="max-w-7xl mx-auto flex justify-between items-center p-6">
        <h1 class="title text-5xl text-yellow-500">MEM HYPERCARS</h1>

        <ul class="hidden md:flex gap-8 font-semibold">
          <li><a href="#" class="hover:text-yellow-500">Home</a></li>
          <li><a href="#" class="hover:text-yellow-500">Fahrzeuge</a></li>
          <li>
            <a href="galery.html" class="hover:text-yellow-500">Galerie</a>
          </li>
          <li><a href="#" class="hover:text-yellow-500">Über uns</a></li>
          <li>
            <a href="kontact.html" class="hover:text-yellow-500">Kontakt</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- KONTAKT -->
    <section class="max-w-7xl mx-auto py-20 px-6">
      <h2 class="title text-5xl mb-10">KONTAKT</h2>

      <form class="space-y-6">
        <input
          type="text"
          placeholder="Name"
          class="w-full p-4 rounded-xl bg-zinc-900"
        />

        <input
          type="email"
          placeholder="E-Mail"
          class="w-full p-4 rounded-xl bg-zinc-900"
        />

        <textarea
          rows="5"
          placeholder="Nachricht"
          class="w-full p-4 rounded-xl bg-zinc-900"
        ></textarea>

        <button class="bg-yellow-500 text-black px-8 py-4 rounded-xl font-bold">
          Termin vereinbaren
        </button>
      </form>
    </section>
    <!-- FOOTER -->
    <footer class="bg-zinc-900 py-10 text-center">
      <p>© 2026 MEM HYPERCARS</p>
    </footer>
  </body>
</html>
